<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Get in touch with Harvey &amp; Lucy Growth Partners. Tell us about your organization and what you're working toward.">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/monogram.svg">
  <script src="js/main.js" type="module"></script>
  <script src="js/form-validation.js" defer></script>
  <title>Harvey &amp; Lucy Growth Partners | Contact</title>
</head>
<body>
  <div id="navbar"></div>

  <main id="main-content">
  <section class="contact-hero">
    <h1>Start the Conversation</h1>
    <p>Tell us about your organization and what you're working toward. We'll be in touch.</p>
  </section>

  <div class="contact-form-section">
    <p class="required-note"><span class="required-indicator" aria-hidden="true">*</span> Required field</p>
    <form netlify name="contact" novalidate>
      <input type="hidden" name="form-name" value="contact">
      <div class="form-group">
        <label for="name">Name <span class="required-indicator" aria-hidden="true">*</span></label>
        <input type="text" id="name" name="name" placeholder="Your full name" required aria-describedby="name-error">
        <span id="name-error" class="field-error" aria-live="polite"></span>
      </div>
      <div class="form-group">
        <label for="email">Email <span class="required-indicator" aria-hidden="true">*</span></label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required aria-describedby="email-error">
        <span id="email-error" class="field-error" aria-live="polite"></span>
      </div>
      <div class="form-group">
        <label for="organization">Organization</label>
        <input type="text" id="organization" name="organization" placeholder="Your company or organization">
      </div>
      <div class="form-group">
        <label for="message">Message <span class="required-indicator" aria-hidden="true">*</span></label>
        <textarea id="message" name="message" placeholder="Tell us what you're working on..." required aria-describedby="message-error"></textarea>
        <span id="message-error" class="field-error" aria-live="polite"></span>
      </div>
      <button type="submit" class="btn btn-primary">Send Message</button>
      <div id="form-status" class="form-status" aria-live="polite" aria-atomic="true"></div>
    </form>
  </div>
  </main>
  <div id="footer"></div>

</body>
</html>
